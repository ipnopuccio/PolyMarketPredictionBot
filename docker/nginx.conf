worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    # 10 requests/sec per IP, 10MB zone (holds ~160k IPs)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=backtest:10m rate=2r/m;

    # ── Upstream Backends ─────────────────────────────────────────────────────
    # Bot FastAPI app on port 5003 (matches settings.dashboard_port)
    upstream bot_api {
        server bot:5003;
        keepalive 16;
    }

    # React SPA served by Nginx inside the dashboard container on port 80
    upstream dashboard {
        server dashboard:80;
        keepalive 8;
    }

    # ── HTTP Server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers (applied to all responses)
        add_header X-Frame-Options          "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        add_header X-Robots-Tag             "noindex, nofollow"               always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:; font-src 'self';" always;

        # Limit request body size (1MB)
        client_max_body_size 1m;

        # ── Health check (no auth, no rate limit — used by Docker healthcheck) ──
        location = /health {
            proxy_pass         http://bot_api/api/v2/health;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ── Backtest endpoints (heavy CPU — tighter rate limit) ───────────────
        location /api/v2/backtest {
            limit_req zone=backtest burst=3 nodelay;

            proxy_pass             http://bot_api;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_set_header       Connection        "";

            # Backtest can take a while — extend timeout
            proxy_read_timeout     120s;
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass             http://bot_api;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_set_header       Connection        "";

            proxy_read_timeout     30s;
            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
        }

        # ── WebSocket / SSE streaming ─────────────────────────────────────────
        # Handles /ws/ (WebSocket) and /stream/ (SSE) routes from ws_stream.py
        location ~ ^/(ws|stream)/ {
            proxy_pass             http://bot_api;
            proxy_http_version     1.1;

            # WebSocket upgrade headers
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;

            # Keep WS connections alive for up to 24 hours
            proxy_read_timeout     86400s;
            proxy_send_timeout     86400s;

            # Disable buffering for real-time streams
            proxy_buffering        off;
            proxy_cache            off;
        }

        # ── React Dashboard (SPA catch-all) ───────────────────────────────────
        location / {
            proxy_pass           http://dashboard;
            proxy_set_header     Host              $host;
            proxy_set_header     X-Real-IP         $remote_addr;
            proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header     X-Forwarded-Proto $scheme;

            proxy_read_timeout   10s;
            proxy_connect_timeout 5s;
        }

        # ── Custom error pages ────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ── HTTPS Server (uncomment and configure after Certbot issues certs) ────
    #
    # Prerequisites:
